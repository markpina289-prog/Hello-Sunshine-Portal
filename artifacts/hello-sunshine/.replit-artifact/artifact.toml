kind = "web"
previewPath = "/"
title = "Hello Sunshine Portal"
version = "1.0.0"
id = "artifacts/hello-sunshine"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19545

[services.development]
run = "pnpm --filter @workspace/hello-sunshine run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hello-sunshine", "run", "build" ]
publicDir = "artifacts/hello-sunshine/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19545"
BASE_PATH = "/"
